name: asttro
description: Seu aplicativo Flutter.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/

flutter_native_splash:
  android: true
  ios: true
  web: false

  fullscreen: true
  # Splash padrão (Android < 12 e iOS)
  color: "#061637"
  image: assets/logo_512.png

  android_12:
    # Fundo do splash
    color: "#061637"

    # Ícone central sem fundo
    image: assets/logo_1152.png